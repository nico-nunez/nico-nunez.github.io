<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Nico Nunez — Resume. View or download my resume." />
  <title>resume — Nico Nunez</title>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="js/components/Navbar.js"></script>
  <script defer src="js/components/Footer.js"></script>
  <script src="js/main.js"></script>
</head>

<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- --- HEADER / NAV --- -->
  <header class="site-header">
    <web-navbar></web-navbar>
  </header>

  <!-- --- MAIN --- -->
  <main id="main-content">

    <nav aria-label="Breadcrumb" class="breadcrumb">
      <a href="index.html">~</a>
      <span class="sep" aria-hidden="true">/</span>
      <span class="current" aria-current="page">resume</span>
    </nav>

    <section aria-labelledby="resume-heading">

      <div class="resume-actions">
        <!-- TODO: Update href once your resume PDF is ready and dropped into assets/ -->
        <a href="assets/resume.pdf" download="Nico_Nunez_Resume.pdf" class="btn" aria-label="Download resume as PDF">
          ↓ download PDF
        </a>
        <a href="assets/resume.pdf" target="_blank" rel="noopener noreferrer" class="btn"
          aria-label="Open resume PDF in a new tab">
          ↗ open in new tab
        </a>
      </div>

      <h1 class="visually-hidden" id="resume-heading">Resume</h1>

      <!-- PDF viewer -->
      <div class="resume-frame-wrapper">
        <!--
          TODO: Drop your resume PDF into assets/resume.pdf to make the viewer work.
          The iframe will display it inline once the file is present.
        -->
        <iframe src="assets/resume.pdf" title="Nico Nunez — Resume (PDF)" aria-label="Inline resume PDF viewer">

          <!-- Fallback for browsers that can't render the iframe -->
          <div class="resume-fallback" role="alert">
            <p>Your browser can't display the PDF inline.</p>
            <p>
              <a href="assets/resume.pdf" download>Download the resume</a> or
              <a href="assets/resume.pdf" target="_blank" rel="noopener noreferrer">open it directly</a>.
            </p>
          </div>
        </iframe>
      </div>

    </section>

  </main>

  <!-- --- FOOTER --- -->
  <web-footer></web-footer>

</body>

</html>
